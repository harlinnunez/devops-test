trigger:
- main

pool:
  name: local-pool   # tu agente self-hosted

variables:
  IMAGE_NAME: demo-app

stages:

# 🔹 1. SonarQube
- stage: Sonar
  jobs:
  - job: sonar
    steps:
    - checkout: self

    - script: |
        npm install
      workingDirectory: app/nginx-nodejs-redis/web

    - script: |
        npx sonar-scanner \
          -Dsonar.projectKey=demo-app \
          -Dsonar.sources=. \
          -Dsonar.host.url=http://localhost:9000 \
          -Dsonar.login=$(SONAR_TOKEN)
      workingDirectory: app/nginx-nodejs-redis/web

# 🔹 2. Build Docker
- stage: Build
  jobs:
  - job: build
    steps:
    - checkout: self

    # 🐳 Build
    - script: |
        docker build -t $(IMAGE_NAME):v1 .
      workingDirectory: app/nginx-nodejs-redis/web
      displayName: Build image

    # 🔐 Login DockerHub
    - script: |
        echo "$(DOCKER_PASS)" | docker login -u "$(DOCKER_USER)" --password-stdin
      displayName: Docker Login

    # 🏷️ Tag image
    - script: |
        docker tag $(IMAGE_NAME):v1 $(DOCKER_USER)/$(IMAGE_NAME):v1
      displayName: Tag image

    # 🚀 Push
    - script: |
        docker push $(DOCKER_USER)/$(IMAGE_NAME):v1
      displayName: Push image

# 🔹 3. Scripts requeridos
- stage: Scripts
  jobs:

  - job: parallel
    strategy:
      parallel: 10
    steps:
    - script: echo "Hola Mundo"

  - job: files
    steps:
    - script: |
        for i in {1..10}; do
          date > file_$i.txt
        done
        cat file_*.txt

# 🔹 4. Deploy (Kubernetes local)
- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: Build
  jobs:
  - job: deploy
    steps:

    - checkout: self

    # ☸️ Apply Kubernetes YAML
    - script: |
        echo "Deploying to Kubernetes..."
        kubectl apply -f infra/k8s/yaml/
      displayName: "Deploy Kubernetes manifests"

    # 🔍 Verify
    - script: |
        kubectl get pods
        kubectl get svc
        kubectl get ingress
      displayName: "Verify deployment"