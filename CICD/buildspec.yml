trigger:
- main

pool:
  name: local-pool   # tu agente self-hosted

variables:
  IMAGE_NAME: demo-app

stages:

# 🔹 1. SonarQube
- stage: Sonar
  jobs:
  - job: sonar
    steps:
    - checkout: self

    - script: |
        npm install
      workingDirectory: app

    - script: |
        npx sonar-scanner \
          -Dsonar.projectKey=demo-app \
          -Dsonar.sources=. \
          -Dsonar.host.url=http://localhost:9000 \
          -Dsonar.login=$(SONAR_TOKEN)
      workingDirectory: app

# 🔹 2. Build Docker
- stage: Build
  jobs:
  - job: build
    steps:
    - checkout: self

    - script: |
        docker build -t $(IMAGE_NAME):v1 .
      displayName: Build image

# 🔹 3. Scripts requeridos
- stage: Scripts
  jobs:

  - job: parallel
    strategy:
      parallel: 10
    steps:
    - script: echo "Hola Mundo"

  - job: files
    steps:
    - script: |
        for i in {1..10}; do
          date > file_$i.txt
        done
        cat file_*.txt

# 🔹 4. Deploy (Kubernetes local)
- stage: Deploy
  jobs:
  - job: deploy
    steps:
    - checkout: self

    - script: |
        kubectl apply -f k8s/base/
      displayName: Deploy to Kubernetes