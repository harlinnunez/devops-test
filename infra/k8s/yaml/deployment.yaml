apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: demoacrdevops1.azurecr.io/demo-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000