trigger:
- main

pool:
  name: local-pool # Tu agente self-hosted

variables:
  dockerRegistryServiceConnection: '3ee452a9-acd4-40e0-92c1-a5dbfe6bf833'
  imageRepository: 'demo-app'
  containerRegistry: 'demoacrdevops1.azurecr.io'
  dockerfilePath: 'app/nginx-nodejs-redis/web/Dockerfile'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'acr-auth-secret'

stages:

# 🔹 1. SonarQube
- stage: Sonar
  displayName: Static Code Analysis
  jobs:
  - job: SonarJob
    steps:
    - checkout: self
    - script: |
        npm install
        npx sonar-scanner \
          -Dsonar.projectKey=$(imageRepository) \
          -Dsonar.sources=. \
          -Dsonar.host.url=http://$(EXTERNAL_IP):9000 \
          -Dsonar.login=$(SONAR_TOKEN)
      workingDirectory: app/nginx-nodejs-redis/web
      displayName: 'Run SonarQube Analysis'

    - task: SonarQubePublish@5
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'

# 🔹 2. Build & Push (Formato Azure DevOps)
- stage: Build
  displayName: Build and Push
  dependsOn: Sonar
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          v1

    # Publicamos los manifiestos que están en infra/k8s/yaml
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'infra/k8s/enviroment'
        artifact: 'manifests'

# 🔹 3. Scripts Requeridos (Jobs en paralelo)
- stage: Scripts
  displayName: Maintenance Scripts
  dependsOn: Build
  jobs:
  - job: ParallelJob
    strategy:
      parallel: 10
    steps:
    - script: echo "Hola Mundo desde instancia $(System.JobPositionInPhase)"
  
  - job: CreateFiles
    steps:
    - script: |
        for i in {1..10}; do
          date > file_$i.txt
        done
        cat file_*.txt
      displayName: 'Generate and Read Files'

# 🔹 4. Deploy (Formato Deployment Job)
- stage: Deploy
  displayName: Deploy to AKS/K8s
  dependsOn: 
  - Build
  - Scripts
  jobs:
  - deployment: DeployJob
    environment: 'aks-prod' # Recuerda crear este environment en Azure DevOps
    strategy:
      runOnce:
        deploy:
          steps:
          # Descargamos los YAML publicados en el stage de Build
          - download: current
            artifact: manifests

          # 🔐 Crear secret para el ACR (necesario en K8s para jalar la imagen)
          - task: KubernetesManifest@0
            displayName: Create Image Pull Secret
            inputs:
              action: createSecret
              secretName: $(imagePullSecret)
              kubernetesServiceConnection: 'aks-service-connection'
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)
              namespace: default

          # 🚀 Deploy usando los manifiestos descargados
          - task: KubernetesManifest@0
            displayName: Deploy to Cluster
            inputs:
              action: deploy
              kubernetesServiceConnection: 'aks-service-connection'
              namespace: default
              manifests: |
                $(Pipeline.Workspace)/manifests/*.yaml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)

          # 🔍 Verificar (Script manual como en tu segundo ejemplo)
          - script: |
              kubectl get pods
              kubectl get svc
            displayName: 'Verify Deployment'