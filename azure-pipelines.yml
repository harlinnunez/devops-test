trigger:
- main

pool:
  name: local-pool # Tu agente self-hosted

variables:
  dockerRegistryServiceConnection: '3ee452a9-acd4-40e0-92c1-a5dbfe6bf833'
  imageRepository: 'demo-app'
  containerRegistry: 'demoacrdevops1.azurecr.io'
  dockerfilePath: 'app/nginx-nodejs-redis/web/Dockerfile'
  tag: '$(Build.BuildId)'
  imagePullSecret: 'acr-auth-secret'
  # 💡 Reemplaza con la IP que obtengas del LoadBalancer de SonarQube
  sonarUrl: 'http://<TU_IP_PUBLICA_AKS>:9000' 

stages:

# 🛠️ STAGE NUEVO: Instalación/Configuración de SonarQube en AKS
- stage: Setup_Sonar
  displayName: Setup SonarQube on AKS
  jobs:
  - job: InstallSonar
    steps:
    - script: |
        # 1. Añadir repo de Helm y actualizar
        helm repo add sonarqube https://SonarSource.github.io/helm-chart-sonarqube
        helm repo update

        # 2. Instalar SonarQube si no existe (Namespace: sonarqube)
        # Usamos --set service.type=LoadBalancer para obtener la IP pública
        helm upgrade --install sonarqube sonarqube/sonarqube \
          --namespace sonarqube \
          --create-namespace \
          --set service.type=LoadBalancer \
          --wait
          
        # 3. Obtener la IP (informativo)
        kubectl get svc -n sonarqube
      displayName: 'Install SonarQube via Helm'

# 🔹 1. SonarQube Analysis
- stage: Sonar
  displayName: Static Code Analysis
  dependsOn: Setup_Sonar
  jobs:
  - job: SonarJob
    steps:
    - checkout: self
    - script: |
        npm install
        npx sonar-scanner \
          -Dsonar.projectKey=$(imageRepository) \
          -Dsonar.sources=. \
          -Dsonar.host.url=$(sonarUrl) \
          -Dsonar.login=$(SONAR_TOKEN)
      workingDirectory: app/nginx-nodejs-redis/web
      displayName: 'Run SonarQube Analysis'

# 🔹 2. Build & Push
- stage: Build
  displayName: Build and Push
  dependsOn: Sonar
  jobs:
  - job: BuildJob
    steps:
    - checkout: self
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          v1

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'infra/k8s/yaml'
        artifact: 'manifests'

# 🔹 3. Scripts Requeridos
- stage: Scripts
  displayName: Maintenance Scripts
  dependsOn: Build
  jobs:
  - job: ParallelJob
    strategy:
      parallel: 10
    steps:
    - script: echo "Hola Mundo desde instancia $(System.JobPositionInPhase)"
  
  - job: CreateFiles
    steps:
    - script: |
        for i in {1..10}; do
          date > file_$i.txt
        done
        cat file_*.txt
      displayName: 'Generate and Read Files'

# 🔹 4. Deploy
- stage: Deploy
  displayName: Deploy to AKS/K8s
  dependsOn: 
  - Build
  - Scripts
  jobs:
  - deployment: DeployJob
    environment: 'aks-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: manifests

          - task: KubernetesManifest@0
            displayName: Create Image Pull Secret
            inputs:
              action: createSecret
              secretName: $(imagePullSecret)
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)
              namespace: default

          - task: KubernetesManifest@0
            displayName: Deploy to Cluster
            inputs:
              action: deploy
              namespace: default
              manifests: |
                $(Pipeline.Workspace)/manifests/*.yml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository):$(tag)

          - script: |
              kubectl get pods
              kubectl get svc
            displayName: 'Verify Deployment'